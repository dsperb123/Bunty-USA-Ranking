name: Refresh ETF Ranking Data

on:
  schedule:
    # 10pm UTC Mon-Fri = 9am AEDT (UTC+11) next morning
    - cron: "0 22 * * 1-5"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance numpy pandas

      - name: Fetch ETF data
        run: python fetch_data.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/etf_ranking.json
          git diff --cached --quiet || git commit -m "chore: refresh ETF ranking data [automated]"
          git push
